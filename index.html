<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>114下學期 性別、健康與多元文化 期末考終極衝刺</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header class="header glass">
        <h1><i class="fas fa-book-open"></i> 114下學期 性別、健康與多元文化 期末考終極衝刺</h1>
        <div class="mode-selector">
            <button class="btn active" data-mode="readaloud"><i class="fas fa-headphones"></i> 語音伴讀</button>
            <button class="btn" data-mode="quiz"><i class="fas fa-tasks"></i> 選擇題特訓</button>
            <button class="btn" data-mode="flashcards"><i class="fas fa-layer-group"></i> 問答閃卡</button>
            <button class="btn" data-mode="cloze"><i class="fas fa-edit"></i> 選擇克漏字</button>
            <button class="btn" data-mode="sprint"><i class="fas fa-rocket"></i> 期末考衝刺</button>
            <button class="btn" data-mode="dictionary"><i class="fas fa-book"></i> 課本名詞字典</button>
        </div>
    </header>

    <main class="container">
        <!-- 語音伴讀區塊 -->
        <section id="readaloud" class="content-section active">
            <div class="controls glass">
                <button id="play-btn" class="control-btn"><i class="fas fa-play"></i> 播放全部</button>
                <button id="pause-btn" class="control-btn"><i class="fas fa-pause"></i> 暫停</button>
                <button id="stop-btn" class="control-btn"><i class="fas fa-stop"></i> 停止</button>
                <select id="voice-select" class="glass-select"></select>
            </div>
            <div id="reader-content" class="glass reading-box">
                <!-- 語音內容將由 JS 動態生成 -->
            </div>
        </section>

        <!-- 閃卡區塊 -->
        <section id="flashcards" class="content-section">
            <div class="flashcard-controls glass">
                <p>點擊卡片翻轉查看答案。可透過下方按鈕切換題目。</p>
                <div class="flashcard-nav">
                    <button id="prev-card" class="control-btn"><i class="fas fa-chevron-left"></i> 上一題</button>
                    <span id="card-counter">1 / 4</span>
                    <button id="next-card" class="control-btn">下一題 <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="flashcard-container">
                <div class="flashcard">
                    <div class="flashcard-inner" id="flashcard-inner">
                        <div class="flashcard-front glass">
                            <h3 id="card-q-title">題目</h3>
                            <p id="card-q-text">載入中...</p>
                            <span class="click-hint"><i class="fas fa-hand-pointer"></i> 點擊翻轉查看解答</span>
                        </div>
                        <div class="flashcard-back glass">
                            <h3>標準擬答</h3>
                            <div id="card-a-text">載入中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 選擇題特訓區塊 -->
        <section id="quiz" class="content-section">
            <div class="quiz-controls glass">
                <p><i class="fas fa-bullseye"></i> 點擊選項進行作答，系統會立即回饋對錯與名師解析！</p>
                <div class="flashcard-nav" style="margin-top: 10px;">
                    <button id="prev-quiz" class="control-btn"><i class="fas fa-chevron-left"></i> 上一題</button>
                    <span id="quiz-counter">1 / 1</span>
                    <button id="next-quiz" class="control-btn">下一題 <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="quiz-container" class="quiz-box glass">
                <h3 id="quiz-q-title" class="quiz-title">載入中...</h3>
                <div id="quiz-options" class="quiz-options">
                    <!-- 動態載入選項 -->
                </div>
                <div id="quiz-explanation" class="quiz-explanation glass" style="display: none;">
                    <h4>👨‍🏫 老師解析</h4>
                    <p id="quiz-explanation-text"></p>
                </div>
            </div>
        </section>

        <!-- 克漏字區塊 -->
        <section id="cloze" class="content-section">
            <div class="cloze-controls glass">
                <p><i class="fas fa-lightbulb"></i> 點擊黑色遮罩區塊以顯示關鍵字，加深記憶。</p>
                <button id="reveal-all" class="control-btn"><i class="fas fa-eye"></i> 顯示全部</button>
            </div>
            <div id="cloze-content" class="cloze-box">
                <!-- 克漏字內容將由 JS 動態生成 -->
            </div>
        </section>

        <!-- 期末考衝刺區塊 -->
        <section id="sprint" class="content-section">
            <div id="sprint-content" class="markdown-body glass">
                <!-- Markdown 內容將由 JS 動態生成 -->
            </div>
        </section>
            <!-- 課本字典區塊 -->
        <section id="dictionary" class="content-section">
            <div id="dictionary-content" class="markdown-body glass">
                <!-- Markdown 內容將由 JS 動態生成 -->
            </div>
        </section>
    </main>

    <script src="app.js?v=3"></script>

    <!-- Update Alert Modal -->
    <div id="update-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: rgba(20, 20, 30, 0.95); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; width: 90%; color: white; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.7);">
            <h2 style="color: #ff4757; margin-top: 0; font-size: 1.5rem;"><i class="fas fa-exclamation-triangle"></i> 重大更新與防坑提醒</h2>
            <div style="font-size: 1.1rem; line-height: 1.6; text-align: left; margin: 20px 0; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;">
                <p style="margin-top:0;">感謝同學的抓蟲！先前題庫中關於<strong>「第10章：新住民的婚姻狀態」</strong>的答案不小心誤植了。</p>
                <p style="margin-bottom:0;">請特別注意，依據課本第 258 頁與內政部統計，正確答案是：<br>
                <strong style="color: #2ed573; font-size: 1.3rem;">👉 「幾乎全是初婚」</strong></p>
            </div>
            <button id="close-modal-btn" style="background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%); border: none; padding: 12px 35px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);">我記住了！</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user has seen this specific alert before
            if (!localStorage.getItem('alert_seen_ch10_first_marriage_fix')) {
                document.getElementById('update-modal').style.display = 'flex';
            }
            document.getElementById('close-modal-btn').addEventListener('click', () => {
                document.getElementById('update-modal').style.display = 'none';
                localStorage.setItem('alert_seen_ch10_first_marriage_fix', 'true');
            });
        });
    </script>
</body>
</html>
