<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D 記憶閃卡 | 期末考特訓</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            z-index: -1;
        }
        .bg-gradient::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            filter: blur(60px);
            animation: pulse 15s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .nav-header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }
        .nav-back {
            color: #a4b0be;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        .nav-back:hover {
            color: #fff;
        }

        .progress-indicator {
            color: #fff;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .scene {
            width: 90%;
            max-width: 600px;
            height: 450px;
            perspective: 1500px;
            margin-top: 5vh;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .card-face-front {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
        }

        .card-face-back {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            transform: rotateY(180deg);
            align-items: flex-start;
            text-align: left;
        }

        .tag {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 800;
            position: absolute;
            top: 25px;
            left: 25px;
        }

        .question-text {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.5;
            margin-top: 20px;
        }

        .tap-hint {
            color: #a4b0be;
            font-size: 0.9rem;
            position: absolute;
            bottom: 25px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .back-title {
            color: #2ed573;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(46, 213, 115, 0.3);
            padding-bottom: 10px;
            width: 100%;
        }

        .keyword-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .keyword-list li {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .keyword-list li i {
            color: #ffa502;
            margin-right: 15px;
            font-size: 1.1rem;
        }

        .keyword-highlight {
            color: #ff4757;
            font-weight: bold;
        }
        .keyword-green {
            color: #2ed573;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            z-index: 10;
        }

        .btn-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn-control:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* 響應式 */
        @media (max-width: 600px) {
            .scene { height: 400px; }
            .question-text { font-size: 1.4rem; }
            .keyword-list li { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="nav-header">
        <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> 回到大廳</a>
        <div class="progress-indicator" id="progressIndicator">1 / 4</div>
    </div>

    <div class="scene">
        <div class="card" id="flashcard">
            <!-- Front -->
            <div class="card-face card-face-front">
                <div class="tag" id="cardTag">第 11 章</div>
                <div class="question-text" id="cardQuestion">載入中...</div>
                <div class="tap-hint"><i class="fas fa-hand-pointer"></i> 點擊翻開答案</div>
            </div>
            <!-- Back -->
            <div class="card-face card-face-back">
                <div class="back-title"><i class="fas fa-brain"></i> 記憶口訣與關鍵字</div>
                <ul class="keyword-list" id="cardKeywords">
                    <!-- 關鍵字列表動態生成 -->
                </ul>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-control" id="prevBtn" title="上一題"><i class="fas fa-chevron-left"></i></button>
        <button class="btn-control" id="nextBtn" title="下一題"><i class="fas fa-chevron-right"></i></button>
    </div>

    <script>
        const cardData = [
            {
                tag: "重點抓題 1 | 第 11 章",
                question: "何謂全球化與在地化？請說明兩者差異，並舉例何謂「全球在地化」？",
                keywords: [
                    "【起】<span class='keyword-highlight'>同質性與標準化</span> vs. <span class='keyword-highlight'>差異性與本土特色</span>",
                    "【承】面對衝擊保持<span class='keyword-green'>文化自信</span>",
                    "【合】<span class='keyword-green'>全球在地化 (Glocalization)</span>",
                    "【例】<span class='keyword-green'>台灣麥當勞</span> 推出金迎招財薯來堡、米漢堡"
                ]
            },
            {
                tag: "重點抓題 2 | 第 6 章",
                question: "請說明醫學與疾病上的「性別差異」，並以女性糖尿病為例說明。",
                keywords: [
                    "【起】破除疾病迷思：有<span class='keyword-highlight'>社會性別差異</span>",
                    "【承】<span class='keyword-green'>第一型糖尿病</span> 年輕女性面臨內分泌失調",
                    "【合】併發症：<span class='keyword-green'>多囊性卵巢囊腫 (PCOS)</span>",
                    "【結】<span class='keyword-green'>國際糖尿病聯盟 (IDF)</span> 提倡 <span class='keyword-highlight'>性別敏感度</span>"
                ]
            },
            {
                tag: "重點抓題 3 | 第 8、11 章",
                question: "非政府組織 (NGO) 對於多元性別族群有何重要性？請以「同志諮詢熱線」為例說明。",
                keywords: [
                    "【起】弱勢族群面臨社會<span class='keyword-highlight'>污名化</span>",
                    "【承】<span class='keyword-green'>非政府組織 (NGO)</span> 撐起 <span class='keyword-highlight'>社會安全網</span>",
                    "【例】代表機構：<span class='keyword-green'>同志諮詢熱線</span>",
                    "【功】提供<span class='keyword-green'>出櫃前的一對一諮詢</span>",
                    "【功】舉辦<span class='keyword-green'>同志父母親的下午茶聚會</span>"
                ]
            },
            {
                tag: "重點抓題 4 | 第 9 章",
                question: "何謂「性別主流化」？試說明 CEDAW 公約的核心概念與國內實施現況。",
                keywords: [
                    "【起】政策預算須落實<span class='keyword-green'>性別主流化</span>",
                    "【承】國際法典：<span class='keyword-green'>CEDAW公約</span>",
                    "【核】三大核心：<span class='keyword-highlight'>不歧視</span>、<span class='keyword-highlight'>實質平等</span>、<span class='keyword-highlight'>國家義務</span>",
                    "【合】台灣現況：2012年<span class='keyword-green'>國內法化</span>，定期繳交國家報告"
                ]
            }
        ];

        let currentIndex = 0;
        const card = document.getElementById('flashcard');
        const tagEl = document.getElementById('cardTag');
        const questionEl = document.getElementById('cardQuestion');
        const keywordsEl = document.getElementById('cardKeywords');
        const progressEl = document.getElementById('progressIndicator');

        function renderCard(index) {
            const data = cardData[index];
            tagEl.textContent = data.tag;
            questionEl.textContent = data.question;
            
            keywordsEl.innerHTML = '';
            data.keywords.forEach(kw => {
                const li = document.createElement('li');
                li.innerHTML = `<i class="fas fa-check-circle"></i> <span>${kw}</span>`;
                keywordsEl.appendChild(li);
            });
            
            progressEl.textContent = `${index + 1} / ${cardData.length}`;
            card.classList.remove('is-flipped');
        }

        // Init
        renderCard(currentIndex);

        // Flip Card Event
        card.addEventListener('click', () => {
            card.classList.toggle('is-flipped');
        });

        // Next/Prev Events
        document.getElementById('nextBtn').addEventListener('click', (e) => {
            e.stopPropagation(); // 防止觸發翻卡
            currentIndex = (currentIndex + 1) % cardData.length;
            renderCard(currentIndex);
        });

        document.getElementById('prevBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + cardData.length) % cardData.length;
            renderCard(currentIndex);
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
            if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
            if (e.key === ' ' || e.key === 'Enter') card.click();
        });
    </script>
</body>
</html>
